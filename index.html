<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Моя стильная визитка</title>
    <style>
       

        /* 2. Стили для центральной карточки */
        .card {
            background: green;
            padding: 40px;
            border-radius: 20px; /* Скругленные углы */
            box-shadow: 0 10px 25px rgba(0,0,0,0.2); /* Тень для объема */
            text-align: center;
            max-width: 350px;
            transition: transform 0.5s ease; /* Анимация при наведении */
        }

        .card:hover {
            transform: translateY(-10px); /* Карточка приподнимается */
        }

        /* 3. Стили для фото (круглое изображение) */
        .profile-img {
            width: 120px;
            height: 120px;
            border-radius: 50%; /* Делаем круглым */
            object-fit: cover;
            border: 4px solid #764ba2;
            margin-bottom: 20px;
        }

        /* 4. Кнопка */
        .btn {
            background-color: #764ba2;
            color: white;
            padding: 12px 25px;
            border: none;
            border-radius: 25px;
            text-decoration: none;
            font-weight: bold;
            display: inline-block;
            margin-top: 20px;
            cursor: pointer;
        }

        .btn:hover {
            background-color: #764ba2;
        }
    </style>
</head>
